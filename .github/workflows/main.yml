name: CI + CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask pytest
          pip install -r flask-app/requirements.txt

      - name: Run tests
        run: pytest flask-app/ --collect only || true

deploy:
   runs-on: ubuntu-latest
   needs: test

   steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: login to docker hub
        uses: docker/login-actions@v3
        with:
           username: ${{ secrets.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD }}

      - name: run docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/foodtrucks:latest .
      - name: push to docker hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/foodtrucks:latest .
